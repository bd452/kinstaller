name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check packaging shell scripts
        run: |
          bash -n scripts/kpm-dev scripts/pack.sh tests/kpm-dev-resolver.sh
          ./tests/kpm-dev-resolver.sh

      - uses: dtolnay/rust-toolchain@stable

      - name: Fetch fonts
        run: ./scripts/fetch-fonts.sh

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --features kpm/mock,kinstaller/mock-backend -- -D warnings

      - name: cargo test kpm mock
        run: cargo test -p kpm --features mock

      - name: cargo build kinstaller mock
        run: cargo build -p kinstaller

  device-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout kindle-kpm-devkit v0.1.0
        uses: actions/checkout@v4
        with:
          repository: bd452/kindle-kpm-devkit
          ref: v0.1.0
          path: .kpm-devkit

      - name: Add kpm-dev to PATH
        run: |
          echo "$GITHUB_WORKSPACE/.kpm-devkit/bin" >> "$GITHUB_PATH"
          test "$(cat .kpm-devkit-version)" = "0.1.0"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch fonts
        run: ./scripts/fetch-fonts.sh

      - name: Install koxtoolchain
        run: ./scripts/setup-koxtoolchain.sh

      - name: Add ARM targets
        run: |
          rustup target add armv7-unknown-linux-gnueabihf
          rustup target add armv7-unknown-linux-gnueabi

      - name: Build kindlehf
        run: ./scripts/build-target.sh kindlehf

      - name: Build kindlepw2
        run: ./scripts/build-target.sh kindlepw2

      - name: Pack kpkg
        run: ./scripts/pack.sh --skip-build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/**

  release:
    needs: device-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.kpkg
            dist/release-metadata.json
          generate_release_notes: true
