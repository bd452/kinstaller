name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check packaging shell scripts
        run: |
          bash -n scripts/kpm-dev scripts/pack.sh tests/kpm-dev-resolver.sh
          ./tests/kpm-dev-resolver.sh

      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt, clippy

      - name: Fetch fonts
        run: ./scripts/fetch-fonts.sh

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --features kpm/mock,kinstaller/mock-backend -- -D warnings

      - name: cargo test kpm mock
        run: cargo test -p kpm --features mock

      - name: cargo build kinstaller mock
        run: cargo build -p kinstaller

  device-build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/bd452/kindle-kpm-build:v0.1.0@sha256:c7bd7e4041717bb16765b97d6fe4f578f40d144fa3628fcad81271e22f18a69b
    env:
      KOXTOOLCHAIN_ROOT: /opt/x-tools/x-tools
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Trust checked-out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check shared devkit version
        run: |
          test "$(cat .kpm-devkit-version)" = "0.1.0"
          test "$(kpm-dev --version)" = "kpm-dev 0.1.0"

      - name: Check release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          expected="${GITHUB_REF_NAME#v}"
          workspace_version="$(awk '
            /^\[workspace\.package\]/ { in_workspace=1; next }
            /^\[/ { in_workspace=0 }
            in_workspace && /^version = / {
              gsub(/^version = "|"$/, "")
              print
              exit
            }
          ' Cargo.toml)"
          manifest_version="$(python3 - <<'PY'
          import json

          with open("package/manifest.json", encoding="utf-8") as package_manifest:
              print(".".join(map(str, json.load(package_manifest)["version"])))
          PY
          )"
          test "$workspace_version" = "$expected"
          test "$manifest_version" = "$expected"

      - name: Fetch fonts
        run: ./scripts/fetch-fonts.sh

      - name: Build kindlehf
        run: ./scripts/build-target.sh kindlehf

      - name: Build kindlepw2
        run: ./scripts/build-target.sh kindlepw2

      - name: Pack kpkg
        run: ./scripts/pack.sh --skip-build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/**

  release:
    needs: device-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.kpkg
            dist/release-metadata.json
          generate_release_notes: true
